add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
# Tighter CSP than the public site: admin has no inline <script> or onclick
# handlers after the round-2 extraction, so script-src drops 'unsafe-inline'.
# That means an injected inline event handler or inline <script> gets blocked
# by the browser even if the server-side escape ever slips.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://099cbdaaadc71eef10329f795a4e564f.r2.cloudflarestorage.com; connect-src 'self' https://099cbdaaadc71eef10329f795a4e564f.r2.cloudflarestorage.com; media-src 'self' blob: https://099cbdaaadc71eef10329f795a4e564f.r2.cloudflarestorage.com; frame-src 'self'; frame-ancestors 'self'; form-action 'self'; base-uri 'self'; object-src 'none'" always;
