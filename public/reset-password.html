<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新しいパスワード — Nami Barden</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" sizes="48x48 32x32 16x16" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="theme-color" content="#FAF7F2">
<link rel="stylesheet" href="/fonts/fonts.css">
<script>
(function() {
  var saved = localStorage.getItem('namibarden-lang');
  if (saved === 'en') document.documentElement.setAttribute('lang', 'en');
})();
</script>
<style>:root{--cream:#FAF7F2;--cream-dark:#F0EAE0;--cream-darker:#E8DFD3;--gold:#C4A882;--gold-dark:#A8895E;--text-dark:#2C2419;--text-medium:#5C4F3D;--text-light:#8B7E6E;--text-muted:#A99E8F;--white:#FFFFFF;--brown-deep:#2A1C10;--font-display:'Playfair Display','Noto Serif JP',serif;--font-body-jp:'Noto Sans JP',sans-serif;--font-body:'Cormorant Garamond','Noto Sans JP',sans-serif;--transition:0.3s ease;--error:#c44;}*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{font-size:16px;}body{font-family:var(--font-body-jp);color:var(--text-dark);background:var(--cream);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}html[lang="en"] body{font-family:var(--font-body);}.auth-container{width:100%;max-width:420px;}.auth-logo{text-align:center;margin-bottom:48px;}.auth-logo a{text-decoration:none;color:var(--text-dark);}.auth-logo-name{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;letter-spacing:0.08em;display:block;}.auth-logo-line{display:block;width:40px;height:1px;background:var(--gold);margin:8px auto;}.auth-logo-sub{font-size:0.7rem;letter-spacing:0.15em;color:var(--text-muted);}.auth-card{background:var(--white);border-radius:4px;padding:40px;box-shadow:0 2px 20px rgba(0,0,0,0.04);}.auth-title{font-family:var(--font-display);font-size:1.4rem;font-weight:500;text-align:center;margin-bottom:32px;}.form-group{margin-bottom:20px;}.form-group label{display:block;font-size:0.82rem;color:var(--text-medium);margin-bottom:6px;}.form-group input{width:100%;padding:12px 16px;border:1px solid var(--cream-darker);border-radius:2px;font-size:0.95rem;font-family:var(--font-body-jp);background:var(--cream);color:var(--text-dark);transition:var(--transition);}.form-group input:focus{outline:none;border-color:var(--gold);background:var(--white);}.form-hint{font-size:0.78rem;color:var(--text-muted);margin-top:4px;}.auth-btn{width:100%;padding:14px;background:var(--gold-dark);color:var(--white);border:none;border-radius:2px;font-size:0.95rem;font-family:var(--font-body-jp);cursor:pointer;transition:var(--transition);letter-spacing:0.05em;margin-top:8px;}.auth-btn:hover{background:var(--brown-deep);}.auth-btn:disabled{opacity:0.6;cursor:not-allowed;}.auth-error{background:#fef2f2;border:1px solid #fecaca;color:var(--error);padding:10px 16px;border-radius:2px;font-size:0.85rem;margin-bottom:20px;display:none;}.auth-footer{text-align:center;margin-top:32px;font-size:0.8rem;color:var(--text-muted);}.auth-footer a{color:var(--text-muted);text-decoration:none;}.auth-footer a:hover{color:var(--gold-dark);}[data-lang="en"]{display:none;}html[lang="en"] [data-lang="ja"]{display:none;}html[lang="en"] [data-lang="en"]{display:initial;}</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo">
    <a href="/">
      <span class="auth-logo-name">Nami Barden</span>
      <span class="auth-logo-line"></span>
      <span class="auth-logo-sub" data-lang="ja">意識学ビジネスコーチ</span>
      <span class="auth-logo-sub" data-lang="en">Conscious Business Coaching</span>
    </a>
  </div>

  <div class="auth-card">
    <h1 class="auth-title">
      <span data-lang="ja">新しいパスワードを設定</span>
      <span data-lang="en">Set New Password</span>
    </h1>

    <div id="error" class="auth-error"></div>

    <form id="resetForm" onsubmit="handleReset(event)">
      <div class="form-group">
        <label>
          <span data-lang="ja">新しいパスワード</span>
          <span data-lang="en">New Password</span>
        </label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
        <p class="form-hint">
          <span data-lang="ja">8文字以上</span>
          <span data-lang="en">At least 8 characters</span>
        </p>
      </div>
      <div class="form-group">
        <label>
          <span data-lang="ja">パスワード確認</span>
          <span data-lang="en">Confirm Password</span>
        </label>
        <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="auth-btn" id="submitBtn">
        <span data-lang="ja">パスワードを更新</span>
        <span data-lang="en">Update Password</span>
      </button>
    </form>
  </div>

  <div class="auth-footer">
    <a href="/login">
      <span data-lang="ja">← ログインに戻る</span>
      <span data-lang="en">← Back to login</span>
    </a>
  </div>
</div>

<script>
const isEn = document.documentElement.lang === 'en';
const params = new URLSearchParams(location.search);
const resetToken = params.get('token');

if (!resetToken) {
  document.getElementById('error').textContent = isEn ? 'Invalid reset link.' : 'リセットリンクが無効です。';
  document.getElementById('error').style.display = 'block';
  document.getElementById('resetForm').style.display = 'none';
}

async function handleReset(e) {
  e.preventDefault();
  const errorEl = document.getElementById('error');
  const btn = document.getElementById('submitBtn');
  errorEl.style.display = 'none';

  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    errorEl.textContent = isEn ? 'Passwords do not match.' : 'パスワードが一致しません。';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = isEn ? 'Updating...' : '更新中...';

  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password })
    });
    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.error;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = isEn ? 'Update Password' : 'パスワードを更新';
      return;
    }

    // Auto-login with returned token
    localStorage.setItem('nb-auth-token', data.token);
    window.location.href = '/my-courses';
  } catch {
    errorEl.textContent = isEn ? 'Connection error. Please try again.' : '接続エラーです。もう一度お試しください。';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = isEn ? 'Update Password' : 'パスワードを更新';
  }
}
</script>
</body>
</html>
