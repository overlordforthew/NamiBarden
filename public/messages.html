<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - Nami Barden</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" sizes="48x48 32x32 16x16" href="/favicon.ico">
<link rel="stylesheet" href="/fonts/fonts.css">
<style>
:root{--cream:#FAF7F2;--cream-dark:#F0EAE0;--cream-darker:#E8DFD3;--gold:#C4A882;--gold-dark:#A8895E;--text-dark:#2C2419;--text-medium:#5C4F3D;--text-light:#8B7E6E;--text-muted:#A99E8F;--white:#fff;--font-display:'Playfair Display','Noto Serif JP',serif;--font-body-jp:'Noto Sans JP',sans-serif}
*{box-sizing:border-box}body{margin:0;font-family:var(--font-body-jp);background:var(--cream);color:var(--text-dark);line-height:1.7}.messages-nav{height:60px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--cream-darker);background:rgba(250,247,242,.94);position:sticky;top:0;z-index:10}.messages-logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;letter-spacing:.05em;color:var(--text-dark);text-decoration:none}.messages-nav a:last-child{font-size:.85rem;color:var(--gold-dark);text-decoration:none}.messages-shell{max-width:1120px;margin:0 auto;padding:28px;display:grid;grid-template-columns:320px 1fr;gap:20px;min-height:calc(100vh - 60px)}.panel{background:var(--white);border:1px solid var(--cream-darker);border-radius:6px;min-height:0}.thread-panel{overflow:hidden}.panel-head{padding:18px 18px 14px;border-bottom:1px solid var(--cream-darker);display:flex;align-items:center;justify-content:space-between;gap:12px}.panel-head h1,.panel-head h2{font-family:var(--font-display);font-weight:500;margin:0;font-size:1.1rem}.dm-btn{border:0;background:var(--gold-dark);color:#fff;border-radius:4px;padding:8px 12px;font-family:inherit;cursor:pointer;white-space:nowrap}.thread-list{display:flex;flex-direction:column;max-height:calc(100vh - 140px);overflow:auto}.thread-item{border:0;border-bottom:1px solid var(--cream-darker);background:transparent;text-align:left;padding:14px 16px;cursor:pointer;font-family:inherit}.thread-item:hover,.thread-item.active{background:var(--cream-dark)}.thread-title{font-weight:600;color:var(--text-dark);display:flex;align-items:center;gap:8px}.thread-meta{font-size:.78rem;color:var(--text-muted);margin-top:4px}.unread-dot{width:8px;height:8px;border-radius:50%;background:#C06060;display:inline-block;flex:0 0 auto}.chat-panel{display:flex;flex-direction:column;min-height:calc(100vh - 116px)}.chat-title{display:flex;flex-direction:column}.chat-subtitle{font-size:.8rem;color:var(--text-muted);font-family:var(--font-body-jp)}.messages-list{padding:18px;display:flex;flex-direction:column;gap:12px;overflow:auto;flex:1}.msg{max-width:min(680px,88%);padding:12px 14px;border-radius:6px;white-space:pre-wrap;font-size:.93rem}.msg.student{align-self:flex-end;background:rgba(196,168,130,.16);border:1px solid rgba(168,137,94,.28)}.msg.nami{align-self:flex-start;background:var(--cream-dark);border:1px solid var(--cream-darker)}.msg-meta{font-size:.72rem;color:var(--text-muted);margin-bottom:4px;display:flex;justify-content:space-between;gap:16px}.attachment-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.attachment-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--cream-darker);border-radius:4px;padding:6px 8px;color:var(--gold-dark);text-decoration:none;background:#fff;font-size:.78rem}.attachment-img{max-height:220px;max-width:100%;border-radius:4px;border:1px solid var(--cream-darker);display:block}.composer{padding:14px 18px;border-top:1px solid var(--cream-darker);display:flex;gap:10px;align-items:flex-end}.composer textarea{flex:1;min-height:76px;max-height:180px;resize:vertical;border:1px solid var(--cream-darker);border-radius:4px;padding:10px 12px;font-family:inherit;font-size:.92rem;background:#fff}.composer button{border:0;background:var(--gold-dark);color:#fff;border-radius:4px;padding:11px 18px;font-family:inherit;cursor:pointer}.composer button:disabled{opacity:.55;cursor:not-allowed}.empty{padding:38px 18px;text-align:center;color:var(--text-muted)}@media (max-width:820px){.messages-shell{grid-template-columns:1fr;padding:16px}.thread-list{max-height:260px}.chat-panel{min-height:60vh}.messages-nav{padding:0 16px}}
</style>
</head>
<body>
<nav class="messages-nav">
  <a href="/" class="messages-logo">Nami Barden</a>
  <a href="/my-courses">マイコース</a>
</nav>
<main class="messages-shell">
  <section class="panel thread-panel">
    <div class="panel-head">
      <h1>Messages</h1>
      <button class="dm-btn" id="newDmBtn" type="button">DM Nami</button>
    </div>
    <div class="thread-list" id="threadList"></div>
  </section>
  <section class="panel chat-panel">
    <div class="panel-head">
      <div class="chat-title">
        <h2 id="chatTitle">Messages</h2>
        <span class="chat-subtitle" id="chatSubtitle"></span>
      </div>
    </div>
    <div class="messages-list" id="messagesList"></div>
    <form class="composer" id="composer">
      <textarea id="messageBody" maxlength="4000" placeholder="メッセージを入力..."></textarea>
      <button type="submit">Send</button>
    </form>
  </section>
</main>
<script>
let me = null;
let threads = [];
let currentThreadId = null;
let stream = null;
let lastSeenMessageId = Number(localStorage.getItem('nb-chat-last-id') || '0');

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text != null) node.textContent = text;
  return node;
}

function formatDateTime(value) {
  if (!value) return '';
  const d = new Date(value);
  return d.toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function threadLabel(thread) {
  if (thread.channel === 'dm') return 'DM with Nami';
  return thread.subject || [thread.courseId, thread.lessonId].filter(Boolean).join(' - ') || 'Course thread';
}

async function api(path, options = {}) {
  const opts = { ...options, credentials: 'same-origin' };
  opts.headers = { ...(opts.headers || {}) };
  if (opts.body && !(opts.body instanceof FormData)) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(path, opts);
  if (res.status === 401) {
    location.href = '/login?redirect=/messages';
    return null;
  }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function renderThreads() {
  const list = document.getElementById('threadList');
  list.textContent = '';
  if (!threads.length) {
    list.appendChild(el('div', 'empty', 'まだメッセージはありません。'));
    return;
  }
  for (const thread of threads) {
    const btn = el('button', `thread-item${Number(thread.id) === Number(currentThreadId) ? ' active' : ''}`);
    btn.type = 'button';
    btn.addEventListener('click', () => openThread(thread.id));
    const title = el('div', 'thread-title');
    if (thread.unread) title.appendChild(el('span', 'unread-dot'));
    title.appendChild(document.createTextNode(threadLabel(thread)));
    btn.appendChild(title);
    btn.appendChild(el('div', 'thread-meta', `${thread.channel === 'dm' ? 'DM' : 'Course'} · ${formatDateTime(thread.lastMessageAt)}`));
    list.appendChild(btn);
  }
}

function renderAttachments(container, attachments) {
  if (!attachments || !attachments.length) return;
  const wrap = el('div', 'attachment-list');
  for (const attachment of attachments) {
    if ((attachment.detectedMime || '').startsWith('image/')) {
      const link = document.createElement('a');
      link.href = attachment.viewUrl;
      link.target = '_blank';
      link.rel = 'noopener';
      const img = document.createElement('img');
      img.className = 'attachment-img';
      img.src = attachment.viewUrl;
      img.alt = attachment.originalFilename || 'attachment';
      link.appendChild(img);
      wrap.appendChild(link);
    } else if ((attachment.detectedMime || '').startsWith('audio/')) {
      const audio = document.createElement('audio');
      audio.controls = true;
      audio.src = attachment.viewUrl;
      wrap.appendChild(audio);
    } else {
      const link = el('a', 'attachment-chip');
      link.href = attachment.viewUrl;
      link.target = '_blank';
      link.rel = 'noopener';
      link.textContent = attachment.originalFilename || 'Attachment';
      wrap.appendChild(link);
    }
  }
  container.appendChild(wrap);
}

function renderMessages(messages) {
  const list = document.getElementById('messagesList');
  list.textContent = '';
  if (!messages.length) {
    list.appendChild(el('div', 'empty', 'ここからNamiにメッセージを送れます。'));
    return;
  }
  for (const msg of messages) {
    const card = el('article', `msg ${msg.sender === 'nami' ? 'nami' : 'student'}`);
    const meta = el('div', 'msg-meta');
    meta.appendChild(el('span', '', msg.sender === 'nami' ? 'Nami' : 'You'));
    meta.appendChild(el('span', '', formatDateTime(msg.createdAt || msg.created_at)));
    card.appendChild(meta);
    card.appendChild(el('div', '', msg.body || ''));
    renderAttachments(card, msg.attachments || []);
    list.appendChild(card);
  }
  list.scrollTop = list.scrollHeight;
}

async function loadThreads() {
  const data = await api('/api/chat/threads');
  if (!data) return;
  threads = data.threads || [];
  renderThreads();
}

async function openThread(id) {
  currentThreadId = Number(id);
  renderThreads();
  const data = await api(`/api/chat/threads/${currentThreadId}`);
  if (!data) return;
  document.getElementById('chatTitle').textContent = threadLabel(data.thread);
  document.getElementById('chatSubtitle').textContent = data.thread.channel === 'dm' ? 'Direct message' : 'Course thread';
  renderMessages(data.messages || []);
}

async function sendMessage(event) {
  event.preventDefault();
  const bodyEl = document.getElementById('messageBody');
  const body = bodyEl.value.trim();
  if (!body) return;
  const button = event.target.querySelector('button');
  button.disabled = true;
  try {
    if (currentThreadId) {
      await api(`/api/chat/threads/${currentThreadId}/messages`, { method: 'POST', body: { body, attachments: [] } });
    } else {
      const data = await api('/api/chat/dm', { method: 'POST', body: { body, attachments: [] } });
      currentThreadId = data.threadId;
    }
    bodyEl.value = '';
    await loadThreads();
    await openThread(currentThreadId);
  } finally {
    button.disabled = false;
  }
}

function startStream() {
  if (stream) stream.close();
  const url = lastSeenMessageId > 0 ? `/api/chat/stream?since=${encodeURIComponent(lastSeenMessageId)}` : '/api/chat/stream';
  stream = new EventSource(url);
  stream.addEventListener('message', (event) => {
    const payload = JSON.parse(event.data);
    if (payload.id) {
      lastSeenMessageId = Math.max(lastSeenMessageId, Number(payload.id));
      localStorage.setItem('nb-chat-last-id', String(lastSeenMessageId));
    }
    loadThreads().then(() => {
      if (currentThreadId && Number(payload.threadId) === Number(currentThreadId)) openThread(currentThreadId);
    }).catch(() => {});
  });
  stream.addEventListener('resync-required', () => {
    loadThreads().then(() => currentThreadId && openThread(currentThreadId)).catch(() => {});
  });
}

async function init() {
  const profile = await api('/api/auth/me');
  if (!profile) return;
  me = profile;
  await loadThreads();
  const dm = threads.find((thread) => thread.channel === 'dm');
  if (dm) await openThread(dm.id);
  else renderMessages([]);
  startStream();
}

document.getElementById('composer').addEventListener('submit', sendMessage);
document.getElementById('newDmBtn').addEventListener('click', () => {
  const dm = threads.find((thread) => thread.channel === 'dm');
  if (dm) openThread(dm.id);
  else {
    currentThreadId = null;
    document.getElementById('chatTitle').textContent = 'DM with Nami';
    document.getElementById('chatSubtitle').textContent = 'Direct message';
    renderThreads();
    renderMessages([]);
    document.getElementById('messageBody').focus();
  }
});
init().catch((err) => {
  document.getElementById('messagesList').textContent = err.message || '読み込みに失敗しました。';
});
</script>
</body>
</html>
