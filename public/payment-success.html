<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お支払い完了 — Nami Barden</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" sizes="48x48 32x32 16x16" href="/favicon.ico">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/fonts/fonts.css">
<style>:root{--cream:#FAF7F2;--gold:#C4A882;--gold-dark:#A8895E;--text-dark:#2C2419;--text-medium:#5C4F3D;--text-muted:#A99E8F;}*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}.card{background:#fff;border-radius:16px;padding:50px 40px;max-width:520px;width:100%;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,0.06);}.check{width:64px;height:64px;background:#E8F5E8;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}.check svg{width:32px;height:32px;color:#4a7c59;}h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:500;margin-bottom:16px;}p{color:var(--text-medium);line-height:1.8;margin-bottom:12px;font-size:0.95rem;}.note{color:var(--text-muted);font-size:0.82rem;margin-top:24px;}.btn{display:inline-block;margin-top:28px;padding:14px 36px;background:var(--gold);color:#fff;text-decoration:none;border-radius:8px;font-size:0.95rem;transition:background 0.3s;}.btn:hover{background:var(--gold-dark);}</style>
</head>
<body>
<div class="card">
  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
    </svg>
  </div>
  <h1>ありがとうございます</h1>
  <p>コーチングプランへのご登録が完了しました。</p>
  <p>確認メールをお送りしましたのでご確認ください。<br>初回セッションの日程について、近日中にメールにてご連絡いたします。</p>
  <p class="note">ご不明な点がございましたら、お気軽にお問い合わせください。</p>
  <a href="/" class="btn">トップに戻る</a>

  <!-- Account creation section -->
  <div id="accountSection" style="display:none; border-top: 1px solid #E8DFD3; margin-top: 36px; padding-top: 32px;">
    <h2 style="font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:500; margin-bottom:12px;">アカウントを作成</h2>
    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:20px;">パスワードを設定すると、いつでもログインしてコースを視聴できます。</p>
    <div id="accountError" style="display:none; background:#fef2f2; border:1px solid #fecaca; color:#c44; padding:10px; border-radius:4px; font-size:0.85rem; margin-bottom:16px;"></div>
    <div id="accountSuccess" style="display:none; background:#f0fdf4; border:1px solid #bbf7d0; color:#4a7; padding:10px; border-radius:4px; font-size:0.85rem; margin-bottom:16px;"></div>
    <form id="accountForm" onsubmit="createAccount(event)" style="text-align:left;">
      <div style="margin-bottom:14px;">
        <label style="display:block; font-size:0.82rem; color:var(--text-medium); margin-bottom:4px;">メールアドレス</label>
        <input type="email" id="accEmail" required style="width:100%; padding:10px 14px; border:1px solid #E8DFD3; border-radius:4px; font-size:0.9rem; background:var(--cream);">
      </div>
      <div style="margin-bottom:14px;">
        <label style="display:block; font-size:0.82rem; color:var(--text-medium); margin-bottom:4px;">パスワード（8文字以上）</label>
        <input type="password" id="accPassword" required minlength="8" style="width:100%; padding:10px 14px; border:1px solid #E8DFD3; border-radius:4px; font-size:0.9rem; background:var(--cream);">
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:flex; align-items:flex-start; gap:8px; font-size:0.82rem; color:var(--text-medium); cursor:pointer;">
          <input type="checkbox" id="accNewsletter" checked style="margin-top:3px; accent-color:var(--gold-dark);">
          <span>ナミ・バーデンからのお知らせ、プロモーション、新コース情報を受け取る</span>
        </label>
      </div>
      <button type="submit" id="accBtn" style="width:100%; padding:12px; background:var(--gold-dark); color:#fff; border:none; border-radius:4px; font-size:0.9rem; cursor:pointer;">アカウントを作成</button>
    </form>
  </div>
</div>

<script>
// Show account section for course purchases
const params = new URLSearchParams(location.search);
if (params.get('session_id')) {
  document.getElementById('accountSection').style.display = 'block';
}

async function createAccount(e) {
  e.preventDefault();
  const errorEl = document.getElementById('accountError');
  const successEl = document.getElementById('accountSuccess');
  const btn = document.getElementById('accBtn');
  errorEl.style.display = 'none';
  successEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '作成中...';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        email: document.getElementById('accEmail').value,
        password: document.getElementById('accPassword').value,
        subscribe: document.getElementById('accNewsletter').checked
      })
    });
    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.error;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'アカウントを作成';
      return;
    }

    // Auth token set via httpOnly cookie by server
    successEl.textContent = 'アカウントを作成しました！マイコースからいつでも視聴できます。';
    successEl.style.display = 'block';
    document.getElementById('accountForm').style.display = 'none';

    // Add link to my courses
    const link = document.createElement('a');
    link.href = '/my-courses';
    link.textContent = 'マイコースを見る →';
    link.style.cssText = 'display:inline-block; margin-top:16px; color:var(--gold-dark); font-size:0.9rem;';
    successEl.after(link);
  } catch {
    errorEl.textContent = '接続エラーです。もう一度お試しください。';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'アカウントを作成';
  }
}
</script>
</body>
</html>
