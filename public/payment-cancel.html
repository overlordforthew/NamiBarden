<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お支払いキャンセル — Nami Barden</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" sizes="48x48 32x32 16x16" href="/favicon.ico">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/fonts/fonts.css">
<style>:root{--cream:#FAF7F2;--gold:#C4A882;--gold-dark:#A8895E;--text-dark:#2C2419;--text-medium:#5C4F3D;--text-muted:#A99E8F;}*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}.card{background:#fff;border-radius:16px;padding:50px 40px;max-width:520px;width:100%;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,0.06);}.icon{width:64px;height:64px;background:#FFF3E0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:28px;}h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:500;margin-bottom:16px;}p{color:var(--text-medium);line-height:1.8;margin-bottom:12px;font-size:0.95rem;}.note{color:var(--text-muted);font-size:0.82rem;margin-top:24px;}.buttons{margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}.btn{display:inline-block;padding:14px 28px;border-radius:8px;font-size:0.95rem;text-decoration:none;transition:all 0.3s;}.btn-primary{background:var(--gold);color:#fff;}.btn-primary:hover{background:var(--gold-dark);}.btn-secondary{background:transparent;color:var(--gold-dark);border:1px solid var(--gold);}.btn-secondary:hover{background:var(--gold);color:#fff;}</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#A8895E" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"/>
    </svg>
  </div>
  <h1>お支払いをキャンセルしました</h1>
  <p>ご安心ください。まだ何もお支払いは発生していません。</p>
  <p>ご不明な点やご質問がございましたら、<br>お気軽に無料相談をご利用ください。</p>
  <div class="buttons">
    <a href="/executive-coaching" class="btn btn-primary">エグゼクティブコーチングに戻る</a>
    <a href="/executive-coaching#consultation" class="btn btn-secondary">無料相談を申し込む</a>
  </div>
</div>
</body>
</html>
