<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compose — Nami Barden Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .compose-body { width:100%; min-height:420px; padding:16px; border:1px solid var(--border); border-radius:6px; background:var(--white); font-family:Helvetica,Arial,sans-serif; font-size:0.95rem; line-height:1.8; color:var(--text-dark); resize:vertical; box-sizing:border-box; }
    .compose-body:focus { outline:none; border-color:var(--gold); }
    .preview-frame { width:100%; min-height:420px; border:1px solid var(--border); border-radius:6px; background:#fff; }
    .help { color:var(--text-light); font-size:0.82rem; margin-top:8px; line-height:1.6; }
    .dirty-badge { display:none; font-size:0.78rem; color:var(--danger); margin-left:8px; }
    .dirty-badge.show { display:inline; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand"><h2>Nami Barden</h2><small>Newsletter Admin</small></div>
    <a href="/admin/dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg><span>Dashboard</span></a>
    <a href="/admin/subscribers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>Subscribers</span></a>
    <a href="/admin/students.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg><span>Students</span></a>
    <a href="/admin/qa.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span>Q&A</span></a>
    <a href="/admin/reminders.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>Email Rules</span></a>
    <a href="/admin/compose.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg><span>Compose</span></a>
    <a href="/admin/campaigns.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><span>Campaigns</span></a>
    <a href="/admin/alerts.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.29 3.86l-7.5 13A1 1 0 003.66 18h16.68a1 1 0 00.87-1.5l-7.5-13a1 1 0 00-1.74 0z"/></svg><span>Alerts</span></a>
    <a href="/admin/lumina.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3l2.5 5.5L20 11l-5.5 2.5L12 19l-2.5-5.5L4 11l5.5-2.5L12 3z"/></svg><span>Lumina</span></a>
    <div class="sidebar-logout">
      <a href="#" id="logoutLink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg><span>Logout</span></a>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Compose Newsletter <span id="dirtyBadge" class="dirty-badge">• unsaved</span></h1>
      <div class="btn-group">
        <button class="btn" id="testBtn" type="button">Send Test</button>
        <button class="btn" id="saveBtn" type="button">Save Draft</button>
        <button class="btn btn-primary" id="sendBtn" type="button">Send Campaign</button>
      </div>
    </div>

    <div id="alerts"></div>

    <div class="card">
      <div class="card-body">
        <div style="display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:16px;">
          <div class="form-group" style="margin:0">
            <label>Subject</label>
            <input type="text" id="subject" placeholder="Newsletter subject line..." maxlength="500">
          </div>
          <div class="form-group" style="margin:0">
            <label>Send to</label>
            <select id="segment">
              <option value="all">All active subscribers</option>
              <option value="pdf_download">PDF downloaders</option>
              <option value="contact_form">Contact form signups</option>
              <option value="newsletter">Newsletter signups</option>
              <option value="import">Imported subscribers</option>
            </select>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
          <div>
            <label>Message</label>
            <textarea id="body" class="compose-body" placeholder="Write your email just like you'd type to a friend.&#10;&#10;Press return twice between paragraphs. Links (https://...) turn into clickable links automatically."></textarea>
            <div class="help">Plain text. Blank line = new paragraph. URLs auto-link. A branded header and unsubscribe footer are added when the email is delivered.</div>
          </div>
          <div>
            <label>Preview</label>
            <iframe id="preview" class="preview-frame" sandbox="" title="Email preview"></iframe>
          </div>
        </div>
      </div>
    </div>

    <!-- Test Send Modal -->
    <div class="modal-overlay" id="testModal">
      <div class="modal">
        <h3>Send Test Email</h3>
        <div class="form-group">
          <label>Send to</label>
          <input type="email" id="testEmail" placeholder="test@example.com" value="overlord.gil.ai@gmail.com">
        </div>
        <div class="btn-group" style="justify-content:flex-end">
          <button class="btn" type="button" id="testCancel">Cancel</button>
          <button class="btn btn-primary" type="button" id="testConfirm">Send Test</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    if (!requireAuth()) throw 'auth';
    initSidebar();

    document.getElementById('logoutLink').addEventListener('click', function(e) {
      e.preventDefault();
      logout();
    });

    // ─── State ─────────────────────────────────────────────────────────────
    let campaignId = null;
    let lastSaved = { subject: '', body: '', segment: 'all' };
    let renderTimer = null;

    const subjectEl = document.getElementById('subject');
    const bodyEl = document.getElementById('body');
    const segmentEl = document.getElementById('segment');
    const previewEl = document.getElementById('preview');
    const dirtyBadge = document.getElementById('dirtyBadge');
    const alertsEl = document.getElementById('alerts');

    // ─── Plain text → HTML ─────────────────────────────────────────────────
    // Keep this in sync with the help text in the UI: blank line = new
    // paragraph, single newline = <br>, URLs become clickable links. We
    // HTML-escape first so there's no way Nami's typing can inject markup.
    function escapeHtmlText(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function linkify(escaped) {
      return escaped.replace(/(https?:\/\/[^\s<]+)/g, function(url) {
        return '<a href="' + url + '" style="color:#A8895E;text-decoration:underline;">' + url + '</a>';
      });
    }
    function plainToHtml(plain) {
      const normalized = String(plain || '').replace(/\r\n/g, '\n').trim();
      if (!normalized) return '';
      const paragraphs = normalized.split(/\n{2,}/);
      return paragraphs.map(function(p) {
        const withBreaks = escapeHtmlText(p).replace(/\n/g, '<br>');
        return '<p style="margin:0 0 18px;line-height:1.8;">' + linkify(withBreaks) + '</p>';
      }).join('\n');
    }
    function wrapEmailShell(innerHtml, subject) {
      const safeSubject = escapeHtmlText(subject || 'Nami Barden');
      return '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + safeSubject + '</title></head>' +
        '<body style="margin:0;padding:0;background:#FAF7F2;font-family:Helvetica,Arial,sans-serif;color:#2C2419;">' +
        '<div style="max-width:600px;margin:0 auto;background:#fff;">' +
        '<div style="padding:28px 32px;text-align:center;border-bottom:1px solid #E8DFD3;">' +
        '<div style="font-family:Georgia,serif;font-size:22px;color:#2C2419;letter-spacing:0.05em;">Nami Barden</div>' +
        '</div>' +
        '<div style="padding:32px;font-size:15px;color:#2C2419;">' + innerHtml + '</div>' +
        '</div></body></html>';
    }
    function currentHtmlBody() {
      const rendered = plainToHtml(bodyEl.value);
      return wrapEmailShell(rendered, subjectEl.value);
    }

    // ─── Dirty tracking ────────────────────────────────────────────────────
    function snapshot() {
      return { subject: subjectEl.value, body: bodyEl.value, segment: segmentEl.value };
    }
    function isDirty() {
      const cur = snapshot();
      return cur.subject !== lastSaved.subject || cur.body !== lastSaved.body || cur.segment !== lastSaved.segment;
    }
    function updateDirtyBadge() {
      dirtyBadge.classList.toggle('show', isDirty());
    }

    // ─── Preview ───────────────────────────────────────────────────────────
    function schedulePreview() {
      clearTimeout(renderTimer);
      renderTimer = setTimeout(renderPreview, 200);
      updateDirtyBadge();
    }
    function renderPreview() {
      // srcdoc works with sandbox="" where doc.open()/write() from the parent
      // is blocked by the same-origin guard.
      previewEl.srcdoc = currentHtmlBody();
    }
    [subjectEl, bodyEl, segmentEl].forEach(function(el) {
      el.addEventListener('input', schedulePreview);
      el.addEventListener('change', schedulePreview);
    });

    // ─── Load existing draft ───────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const editingId = urlParams.get('id');
    if (editingId) {
      (async function() {
        try {
          const data = await api('/campaigns/' + encodeURIComponent(editingId));
          const c = data.campaign;
          if (!c) return;
          if (c.status !== 'draft') {
            showAlert(alertsEl, 'This campaign is already ' + c.status + ' — opening as read-only is not supported yet.', 'error');
            return;
          }
          campaignId = c.id;
          subjectEl.value = c.subject || '';
          // text_body is what Nami typed; html_body is the rendered shell
          // we generated on save. Round-trip uses text_body.
          bodyEl.value = c.text_body || '';
          segmentEl.value = c.segment || 'all';
          lastSaved = snapshot();
          renderPreview();
          updateDirtyBadge();
        } catch (e) { console.error(e); }
      })();
    } else {
      renderPreview();
    }

    // ─── Actions ───────────────────────────────────────────────────────────
    document.getElementById('saveBtn').addEventListener('click', saveDraft);
    document.getElementById('testBtn').addEventListener('click', openTest);
    document.getElementById('sendBtn').addEventListener('click', sendCampaign);
    document.getElementById('testCancel').addEventListener('click', function() {
      document.getElementById('testModal').classList.remove('show');
    });
    document.getElementById('testConfirm').addEventListener('click', doSendTest);

    async function saveDraft() {
      const subject = subjectEl.value.trim();
      const body = bodyEl.value;
      const segment = segmentEl.value;
      if (!subject) { showAlert(alertsEl, 'Subject is required', 'error'); return; }
      if (!body.trim()) { showAlert(alertsEl, 'Write something in the message box first', 'error'); return; }

      const payload = {
        subject: subject,
        html_body: wrapEmailShell(plainToHtml(body), subject),
        text_body: body,
        segment: segment
      };
      try {
        let data;
        if (campaignId) {
          data = await api('/campaigns/' + encodeURIComponent(campaignId), { method: 'PUT', body: payload });
        } else {
          data = await api('/campaigns', { method: 'POST', body: payload });
          campaignId = data.id;
          history.replaceState({}, '', '/admin/compose.html?id=' + campaignId);
        }
        lastSaved = snapshot();
        updateDirtyBadge();
        showAlert(alertsEl, 'Draft saved');
      } catch (e) {
        showAlert(alertsEl, e.message, 'error');
      }
    }

    function openTest() {
      if (!campaignId || isDirty()) {
        showAlert(alertsEl, 'Save the draft first so the test matches what will send', 'error');
        return;
      }
      document.getElementById('testModal').classList.add('show');
    }

    async function doSendTest() {
      const email = document.getElementById('testEmail').value.trim();
      if (!email) return;
      try {
        await api('/campaigns/' + encodeURIComponent(campaignId) + '/test', { method: 'POST', body: { email } });
        document.getElementById('testModal').classList.remove('show');
        showAlert(alertsEl, 'Test sent to ' + email);
      } catch (e) {
        showAlert(alertsEl, e.message, 'error');
      }
    }

    async function sendCampaign() {
      if (!campaignId) { showAlert(alertsEl, 'Save as draft first', 'error'); return; }
      if (isDirty()) { showAlert(alertsEl, 'Unsaved changes — save the draft before sending', 'error'); return; }
      if (!confirm('Send this campaign to all matching subscribers? This cannot be undone.')) return;
      try {
        const data = await api('/campaigns/' + encodeURIComponent(campaignId) + '/send', { method: 'POST' });
        showAlert(alertsEl, 'Campaign sending to ' + data.total + ' subscribers');
        setTimeout(function() { window.location.href = '/admin/campaigns.html'; }, 1500);
      } catch (e) {
        showAlert(alertsEl, e.message, 'error');
      }
    }

    window.addEventListener('beforeunload', function(e) {
      if (isDirty()) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
</body>
</html>
