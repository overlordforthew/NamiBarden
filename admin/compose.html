<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compose — Nami Barden Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .compose-body { width:100%; min-height:420px; padding:16px; border:1px solid var(--border); border-radius:6px; background:var(--white); font-family:Helvetica,Arial,sans-serif; font-size:0.95rem; line-height:1.8; color:var(--text-dark); resize:vertical; box-sizing:border-box; }
    .compose-body:focus { outline:none; border-color:var(--gold); }
    .preview-frame { width:100%; min-height:420px; border:1px solid var(--border); border-radius:6px; background:#fff; }
    .help { color:var(--text-light); font-size:0.82rem; margin-top:8px; line-height:1.6; }
    .dirty-badge { display:none; font-size:0.78rem; color:var(--danger); margin-left:8px; }
    .dirty-badge.show { display:inline; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand"><h2>Nami Barden</h2><small>Newsletter Admin</small></div>
    <a href="/admin/dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg><span>Dashboard</span></a>
    <a href="/admin/subscribers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>Subscribers</span></a>
    <a href="/admin/students.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg><span>Students</span></a>
    <a href="/admin/qa.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span>Q&A</span></a>
    <a href="/admin/reminders.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>Email Rules</span></a>
    <a href="/admin/compose.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg><span>Compose</span></a>

    <a href="/admin/lumina.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3l2.5 5.5L20 11l-5.5 2.5L12 19l-2.5-5.5L4 11l5.5-2.5L12 3z"/></svg><span>Lumina</span></a>
    <div class="sidebar-logout">
      <a href="#" id="logoutLink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg><span>Logout</span></a>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Compose Newsletter <span id="dirtyBadge" class="dirty-badge">• unsaved</span></h1>
      <div class="btn-group">
        <button class="btn" id="testBtn" type="button">Send Test</button>
        <button class="btn" id="saveBtn" type="button">Save Draft</button>
        <button class="btn btn-primary" id="sendBtn" type="button">Send Campaign</button>
      </div>
    </div>

    <div id="alerts"></div>

    <div class="card">
      <div class="card-body">
        <div style="display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:16px;">
          <div class="form-group" style="margin:0">
            <label>Subject</label>
            <input type="text" id="subject" placeholder="Newsletter subject line..." maxlength="500">
          </div>
          <div class="form-group" style="margin:0">
            <label>Send to</label>
            <select id="segment">
              <option value="all">All active subscribers</option>
              <option value="pdf_download">PDF downloaders</option>
              <option value="contact_form">Contact form signups</option>
              <option value="newsletter">Newsletter signups</option>
              <option value="import">Imported subscribers</option>
            </select>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
          <div>
            <label>Message</label>
            <textarea id="body" class="compose-body" placeholder="Write your email just like you'd type to a friend.&#10;&#10;Press return twice between paragraphs. Links (https://...) turn into clickable links automatically."></textarea>
            <div class="help">Plain text. Blank line = new paragraph. URLs auto-link. A branded header and unsubscribe footer are added when the email is delivered.</div>
          </div>
          <div>
            <label>Preview</label>
            <iframe id="preview" class="preview-frame" sandbox="" title="Email preview"></iframe>
          </div>
        </div>
      </div>
    </div>

    <!-- Test Send Modal -->
    <div class="modal-overlay" id="testModal">
      <div class="modal">
        <h3>Send Test Email</h3>
        <div class="form-group">
          <label>Send to</label>
          <input type="email" id="testEmail" placeholder="test@example.com" value="overlord.gil.ai@gmail.com">
        </div>
        <div class="btn-group" style="justify-content:flex-end">
          <button class="btn" type="button" id="testCancel">Cancel</button>
          <button class="btn btn-primary" type="button" id="testConfirm">Send Test</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/admin/admin.js?v=2"></script>
  <script src="/admin/js/compose.js?v=2"></script>
</body>
</html>
