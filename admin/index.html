<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Nami Barden</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-page">
  <div class="login-box">
    <h1>Nami Barden</h1>
    <p>Admin Dashboard</p>
    <form id="loginForm">
      <div class="form-group">
        <input type="password" id="password" placeholder="Password" required autofocus>
      </div>
      <p id="error" style="color:var(--danger); font-size:0.85rem; margin-bottom:12px; display:none;"></p>
      <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
    </form>
  </div>
  <script src="/admin/js/login.js?v=2"></script>
</body>
</html>
