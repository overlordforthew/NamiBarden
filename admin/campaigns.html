    <div class="sidebar-logout">
      <a href="#" id="logoutLink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg><span>Logout</span></a>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1 id="pageTitle">Campaigns</h1>
      <a href="/admin/compose.html" class="btn btn-primary">New Campaign</a>
    </div>

    <!-- Campaign List View -->
    <div id="listView">
      <div class="card">
        <div class="card-body" style="padding:0; overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Subject</th>
                <th>Status</th>
                <th>Segment</th>
                <th>Sent</th>
                <th>Opens</th>
                <th>Clicks</th>
                <th>Bounced</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="campaignsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Campaign Detail View -->
    <div id="detailView" style="display:none;">
      <button class="btn" id="backBtn" type="button" style="margin-bottom:16px">&larr; Back to list</button>

      <div class="stat-grid" id="detailStats"></div>

      <div class="card">
        <div class="card-header"><h3>Recipients</h3></div>
        <div class="card-body" style="padding:0; overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Status</th>
                <th>Opened</th>
                <th>Clicked</th>
              </tr>
            </thead>
            <tbody id="recipientsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/admin/admin.js?v=2"></script>
  <script src="/admin/js/campaigns.js?v=2"></script>
</body>
</html>
