<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Students — Nami Barden Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .progress-bar{position:relative;height:6px;background:#e8e4de;border-radius:3px;overflow:hidden;min-width:120px;}
    .progress-bar-fill{position:absolute;top:0;left:0;height:100%;background:var(--gold);border-radius:3px;}
    .course-chip{display:inline-block;padding:2px 8px;background:rgba(196,168,130,0.18);color:var(--gold-dark);border-radius:10px;font-size:0.72rem;margin-right:4px;}
    .unread-badge{display:inline-block;min-width:18px;padding:1px 6px;background:#C06060;color:#fff;border-radius:9px;font-size:0.7rem;text-align:center;}
    .student-detail{display:none;}
    .student-detail.active{display:block;}
    .lesson-row{display:flex;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid var(--border);}
    .lesson-row:last-child{border-bottom:none;}
    .lesson-status{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.7rem;}
    .lesson-status.completed{background:#7A9E7E;color:#fff;}
    .lesson-status.in-progress{background:var(--gold);color:#fff;}
    .lesson-status.unstarted{background:var(--border);color:var(--text-light);}
    .lesson-meta{flex:1;min-width:0;}
    .lesson-time{font-size:0.8rem;color:var(--text-light);}
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand"><h2>Nami Barden</h2><small>Newsletter Admin</small></div>
    <a href="/admin/dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg><span>Dashboard</span></a>
    <a href="/admin/subscribers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>Subscribers</span></a>
    <a href="/admin/students.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg><span>Students</span></a>
    <a href="/admin/qa.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span>Q&A</span></a>
    <a href="/admin/compose.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg><span>Compose</span></a>
    <a href="/admin/campaigns.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><span>Campaigns</span></a>
    <a href="/admin/alerts.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.29 3.86l-7.5 13A1 1 0 003.66 18h16.68a1 1 0 00.87-1.5l-7.5-13a1 1 0 00-1.74 0z"/></svg><span>Alerts</span></a>
    <a href="/admin/lumina.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3l2.5 5.5L20 11l-5.5 2.5L12 19l-2.5-5.5L4 11l5.5-2.5L12 3z"/></svg><span>Lumina</span></a>
    <div class="sidebar-logout">
      <a href="#" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg><span>Logout</span></a>
    </div>
  </nav>

  <main class="main-content">
    <!-- List view -->
    <div id="listView">
      <div class="page-header">
        <h1>Students</h1>
      </div>

      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search email or name..." style="min-width:250px">
        <select id="courseFilter">
          <option value="">All courses</option>
          <option value="course-1">Course 1 — 愛を引き寄せる</option>
          <option value="course-2">Course 2 — 愛を深める</option>
        </select>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0; overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Student</th>
                <th>Courses</th>
                <th>Progress</th>
                <th>Last Active</th>
                <th>Purchased</th>
                <th>Q&A</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="studentsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Detail view -->
    <div id="detailView" class="student-detail">
      <div class="page-header">
        <h1 id="detailName">Student</h1>
        <button class="btn" onclick="showList()">← Back to students</button>
      </div>
      <div id="detailCourses"></div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    if (!requireAuth()) throw 'auth';
    initSidebar();

    const COURSE_LABEL = {
      'course-1': 'Course 1',
      'course-2': 'Course 2',
      'course-bundle': 'Bundle'
    };

    async function loadStudents() {
      const search = document.getElementById('searchInput').value;
      const courseId = document.getElementById('courseFilter').value;
      const params = new URLSearchParams();
      if (search) params.set('search', search);
      if (courseId) params.set('courseId', courseId);

      try {
        const data = await api(`/students?${params}`);
        const tb = document.getElementById('studentsTable');
        if (!data.students.length) {
          tb.innerHTML = '<tr><td colspan="7" class="empty">No students yet</td></tr>';
          return;
        }
        tb.innerHTML = data.students.map(s => {
          const courseChips = (s.courseIds || []).map(id => `<span class="course-chip">${escapeHtml(COURSE_LABEL[id] || id)}</span>`).join('');
          const total = s.startedCount || 0;
          const done = s.completedCount || 0;
          const pct = total > 0 ? Math.round((done / total) * 100) : 0;
          const lastActive = s.lastActiveAt ? formatDateTime(s.lastActiveAt) : '—';
          const unread = s.unreadThreadCount > 0 ? `<span class="unread-badge">${s.unreadThreadCount}</span>` : '';
          const threads = s.threadCount > 0 ? `${s.threadCount} ${unread}` : '—';
          return `<tr>
            <td><div style="font-weight:500">${escapeHtml(s.name || s.email)}</div>${s.name ? `<div style="font-size:0.8rem;color:var(--text-light)">${escapeHtml(s.email)}</div>` : ''}</td>
            <td>${courseChips || '—'}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                <span style="font-size:0.82rem;color:var(--text-light);white-space:nowrap">${done}/${total || '?'} (${pct}%)</span>
              </div>
            </td>
            <td>${lastActive}</td>
            <td>${formatDate(s.lastPurchasedAt)}</td>
            <td>${threads}</td>
            <td>${s.customerId ? `<a class="btn btn-sm" href="/admin/customers.html#/c/${encodeURIComponent(s.customerId)}">Customer</a>` : '—'}</td>
          </tr>`;
        }).join('');
      } catch (e) { console.error(e); }
    }

    async function showDetail(token) {
      try {
        const data = await api(`/students/${token}`);
        document.getElementById('detailName').textContent = data.student.name || data.student.email;
        const el = document.getElementById('detailCourses');
        el.innerHTML = data.courses.map(course => {
          const pct = course.totalLessons > 0 ? Math.round((course.completedCount / course.totalLessons) * 100) : 0;
          const lessons = course.lessons.map(lesson => {
            if (lesson.type === 'pdf' || lesson.type === 'ending') return '';
            const status = lesson.completed ? 'completed' : (lesson.lastWatchedAt ? 'in-progress' : 'unstarted');
            const icon = lesson.completed ? '✓' : (lesson.lastWatchedAt ? '▶' : '');
            const posLabel = lesson.completed ? 'Completed' :
              lesson.lastWatchedAt ? `Stopped at ${formatSeconds(lesson.position)}${lesson.duration ? ' / ' + formatSeconds(lesson.duration) : ''}` :
              'Not started';
            const watched = lesson.lastWatchedAt ? formatDateTime(lesson.lastWatchedAt) : '';
            return `<div class="lesson-row">
              <div class="lesson-status ${status}">${icon}</div>
              <div class="lesson-meta">
                <div style="font-size:0.9rem;font-weight:500">${escapeHtml(lesson.title)}</div>
                <div class="lesson-time">${posLabel}${watched ? ` · ${watched}` : ''}</div>
              </div>
            </div>`;
          }).join('');
          return `<div class="card" style="margin-bottom:20px">
            <div class="card-header">
              <h3>${escapeHtml(course.courseName)}</h3>
              <div style="display:flex;align-items:center;gap:12px;">
                <div class="progress-bar" style="width:160px;"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                <span style="font-size:0.85rem;color:var(--text-light)">${course.completedCount}/${course.totalLessons} (${pct}%)</span>
              </div>
            </div>
            <div class="card-body">${lessons || '<p class="empty">No progress yet</p>'}</div>
          </div>`;
        }).join('');
        document.getElementById('listView').style.display = 'none';
        document.getElementById('detailView').classList.add('active');
      } catch (e) { alert(e.message); }
    }

    function showList() {
      document.getElementById('detailView').classList.remove('active');
      document.getElementById('listView').style.display = '';
    }

    function formatSeconds(s) {
      s = Math.floor(Number(s) || 0);
      const mins = Math.floor(s / 60);
      const secs = (s % 60).toString().padStart(2, '0');
      return `${mins}:${secs}`;
    }

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadStudents, 300);
    });
    document.getElementById('courseFilter').addEventListener('change', loadStudents);

    loadStudents();
  </script>
</body>
</html>
