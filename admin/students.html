<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Students — Nami Barden Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .progress-bar{position:relative;height:6px;background:#e8e4de;border-radius:3px;overflow:hidden;min-width:120px;}
    .progress-bar-fill{position:absolute;top:0;left:0;height:100%;background:var(--gold);border-radius:3px;}
    .course-chip{display:inline-block;padding:2px 8px;background:rgba(196,168,130,0.18);color:var(--gold-dark);border-radius:10px;font-size:0.72rem;margin-right:4px;}
    .unread-badge{display:inline-block;min-width:18px;padding:1px 6px;background:#C06060;color:#fff;border-radius:9px;font-size:0.7rem;text-align:center;}
    .student-detail{display:none;}
    .student-detail.active{display:block;}
    .lesson-row{display:flex;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid var(--border);}
    .lesson-row:last-child{border-bottom:none;}
    .lesson-status{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.7rem;}
    .lesson-status.completed{background:#7A9E7E;color:#fff;}
    .lesson-status.in-progress{background:var(--gold);color:#fff;}
    .lesson-status.unstarted{background:var(--border);color:var(--text-light);}
    .lesson-meta{flex:1;min-width:0;}
    .lesson-time{font-size:0.8rem;color:var(--text-light);}
  </style>
</head>
<body>

    <a href="/admin/subscribers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>Subscribers</span></a>

  <main class="main-content">
    <!-- List view -->
    <div id="listView">
      <div class="page-header">
        <h1>Students</h1>
      </div>

      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search email or name..." style="min-width:250px">
        <select id="courseFilter">
          <option value="">All courses</option>
          <option value="course-1">Course 1 — 愛を引き寄せる</option>
          <option value="course-2">Course 2 — 愛を深める</option>
        </select>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0; overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Student</th>
                <th>Courses</th>
                <th>Progress</th>
                <th>Last Active</th>
                <th>Purchased</th>
                <th>Q&A</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="studentsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Detail view -->
    <div id="detailView" class="student-detail">
      <div class="page-header">
        <h1 id="detailName">Student</h1>
        <button class="btn" id="backBtn" type="button">← Back to students</button>
      </div>
      <div id="detailCourses"></div>
    </div>
  </main>

  <script src="/admin/admin.js?v=2"></script>
  <script src="/admin/js/students.js?v=2"></script>

</html>
