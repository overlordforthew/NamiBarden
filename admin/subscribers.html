</head>
<body>

    <a href="/admin/students.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg><span>Students</span></a>
    <a href="/admin/qa.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span>Q&A</span></a>
    <a href="/admin/reminders.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>Email Rules</span></a>
    <a href="/admin/compose.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg><span>Compose</span></a>

      <a href="#" id="logoutLink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg><span>Logout</span></a>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Subscribers</h1>
      <div class="btn-group">
        <button class="btn" id="exportBtn" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:16px;height:16px"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg> Export CSV</button>
        <button class="btn" id="openImportBtn" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:16px;height:16px"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg> Import CSV</button>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search email or name..." style="min-width:250px">
      <select id="statusFilter">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="unsubscribed">Unsubscribed</option>
        <option value="bounced">Bounced</option>
      </select>
      <select id="sourceFilter">
        <option value="">All sources</option>
        <option value="contact_form">Contact form</option>
        <option value="pdf_download">PDF download</option>
        <option value="newsletter">Newsletter</option>
        <option value="import">Import</option>
      </select>
    </div>

    <div class="card">
      <div class="card-body" style="padding:0; overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Name</th>
              <th>Source</th>
              <th>Status</th>
              <th>Tags</th>
              <th>Subscribed</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="subscribersTable"></tbody>
        </table>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>

    <!-- Import Modal -->
    <div class="modal-overlay" id="importModal">
      <div class="modal">
        <h3>Import Subscribers</h3>
        <p style="color:var(--text-light); font-size:0.85rem; margin-bottom:16px;">CSV with columns: email, name (optional), source (optional)</p>
        <form id="importForm">
          <div class="form-group">
            <input type="file" id="csvFile" accept=".csv" required>
          </div>
          <div class="btn-group" style="justify-content:flex-end">
            <button type="button" class="btn" id="importCancelBtn">Cancel</button>
            <button type="submit" class="btn btn-primary">Import</button>
          </div>
        </form>
        <p id="importResult" style="margin-top:12px; font-size:0.85rem;"></p>
      </div>
    </div>

    <!-- Tags Modal -->
    <div class="modal-overlay" id="tagsModal">
      <div class="modal">
        <h3>Edit Tags</h3>
        <p style="color:var(--text-light); font-size:0.85rem; margin-bottom:16px;" id="tagsEmail"></p>
        <div class="form-group">
          <input type="text" id="tagsInput" placeholder="Comma-separated tags (e.g. vip, coaching)">
        </div>
        <div class="btn-group" style="justify-content:flex-end">
          <button class="btn" id="tagsCancelBtn" type="button">Cancel</button>
          <button class="btn btn-primary" id="tagsSaveBtn" type="button">Save</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/admin/admin.js?v=2"></script>
  <script src="/admin/js/subscribers.js?v=2"></script>
</body>
</html>
