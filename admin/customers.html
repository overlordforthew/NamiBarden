<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customers — Nami Barden Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .sortable{background:none;border:0;color:inherit;font:inherit;text-transform:inherit;letter-spacing:inherit;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:4px;}
    .sortable.active{color:var(--gold-dark);}
    .customer-link{color:var(--gold-dark);text-decoration:none;font-weight:600;}
    .customer-link:hover{text-decoration:underline;}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;}
    .metric{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:14px;}
    .metric .label{font-size:0.75rem;color:var(--text-light);text-transform:uppercase;letter-spacing:0.04em;}
    .metric .value{font-size:1rem;font-weight:600;margin-top:4px;word-break:break-word;}
    .section-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
    .progress-bar{height:8px;background:#e8e4de;border-radius:4px;overflow:hidden;min-width:120px;}
    .progress-bar-fill{height:100%;background:var(--gold);border-radius:4px;}
    .chip-list{display:flex;gap:6px;flex-wrap:wrap;}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;background:var(--cream);border:1px solid var(--border);border-radius:4px;font-size:0.76rem;}
    .chip button{border:0;background:transparent;color:var(--danger);cursor:pointer;font:inherit;padding:0 2px;}
    .tag-editor{display:flex;gap:8px;margin-top:12px;}
    .tag-editor input{min-width:0;}
    .status-lifetime,.status-active,.status-trialing,.status-grace{background:#e6f7ed;color:#1a7;}
    .status-expired,.status-refunded,.status-revoked{background:#fee;color:#c44;}
    .status-none{background:#eef0f2;color:#667;}
    .notes-state{font-size:0.8rem;color:var(--text-light);margin-top:8px;}
    .muted{color:var(--text-light);}
    @media (max-width:980px){.section-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand"><h2>Nami Barden</h2><small>Newsletter Admin</small></div>
    <a href="/admin/dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg><span>Dashboard</span></a>
    <a href="/admin/customers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 11c1.657 0 3-1.567 3-3.5S17.657 4 16 4s-3 1.567-3 3.5S14.343 11 16 11zM8 11c1.657 0 3-1.567 3-3.5S9.657 4 8 4 5 5.567 5 7.5 6.343 11 8 11zM2 20c.5-3 2.5-5 6-5s5.5 2 6 5M10 20c.4-2.4 2-4 6-4 3.2 0 5 1.5 6 4"/></svg><span>Customers</span></a>
    <a href="/admin/matrix.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5h16M4 12h16M4 19h16M9 5v14M15 5v14"/></svg><span>Matrix</span></a>
    <a href="/admin/subscribers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 20H7a5 5 0 0110 0zM12 10a3 3 0 100-6 3 3 0 000 6z"/></svg><span>Subscribers</span></a>
    <a href="/admin/students.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 14l9-5-9-5-9 5 9 5zM6 12v5c2 2 10 2 12 0v-5"/></svg><span>Students</span></a>
    <a href="/admin/qa.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12c0 4-4 7-9 7-1.4 0-2.8-.3-4-.8L3 20l1.5-4C3.6 14.8 3 13.4 3 12c0-4 4-7 9-7s9 3 9 7z"/></svg><span>Q&A</span></a>
    <a href="/admin/compose.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg><span>Compose</span></a>
    <a href="/admin/campaigns.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16v12H4zM4 7l8 6 8-6"/></svg><span>Campaigns</span></a>
    <a href="/admin/alerts.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.3 4l-8 14h19.4l-8-14a2 2 0 00-3.4 0z"/></svg><span>Alerts</span></a>
    <a href="/admin/lumina.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3l2.5 5.5L20 11l-5.5 2.5L12 19l-2.5-5.5L4 11l5.5-2.5L12 3z"/></svg><span>Lumina</span></a>
    <div class="sidebar-logout"><a href="#" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4-4-4M21 12H7M13 20H5a2 2 0 01-2-2V6a2 2 0 012-2h8"/></svg><span>Logout</span></a></div>
  </nav>

  <main class="main-content">
    <div id="listView">
      <div class="page-header">
        <h1>Customers</h1>
        <div class="btn-group">
          <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-light);margin:0;">
            <input type="checkbox" id="includeNotesExport" style="width:auto"> Include notes
          </label>
          <button class="btn" id="exportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>Export CSV</button>
        </div>
      </div>

      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search email or name..." style="min-width:250px">
        <input type="text" id="tagInput" placeholder="Tag">
        <select id="luminaFilter">
          <option value="">All Lumina</option>
          <option value="lifetime">lifetime</option>
          <option value="active">active</option>
          <option value="trialing">trialing</option>
          <option value="grace">grace</option>
          <option value="expired">expired</option>
          <option value="refunded">refunded</option>
          <option value="revoked">revoked</option>
          <option value="none">none</option>
        </select>
        <select id="courseFilter">
          <option value="">All courses</option>
          <option value="course-1">Course 1</option>
          <option value="course-2">Course 2</option>
        </select>
        <select id="activityFilter">
          <option value="">Any activity</option>
          <option value="30d">Last 30 days</option>
          <option value="90d">Last 90 days</option>
          <option value="never">Never</option>
        </select>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0;overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Name</th>
                <th><button class="sortable active" data-sort="created_at">Signup</button></th>
                <th><button class="sortable" data-sort="last_login_at">Last Login</button></th>
                <th><button class="sortable" data-sort="total_paid_jpy">Paid</button></th>
                <th><button class="sortable" data-sort="course_count">Courses</button></th>
                <th>Lumina</th>
                <th>Tags</th>
              </tr>
            </thead>
            <tbody id="customersTable"></tbody>
          </table>
        </div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <div id="detailView" style="display:none;">
      <div class="page-header">
        <h1 id="detailTitle">Customer</h1>
        <a class="btn" href="#/">Back to customers</a>
      </div>
      <div id="detailRoot"></div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    if (!requireAuth()) throw 'auth';
    initSidebar();

    let currentPage = 1;
    let currentSort = 'created_at';
    let currentDir = 'desc';
    let currentCustomer = null;
    let noteTimer = null;
    let lastSavedNotes = '';
    const limit = 50;

    function yen(value) {
      return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY', maximumFractionDigits: 0 }).format(Number(value) || 0);
    }

    function setText(el, value) {
      el.textContent = value == null || value === '' ? '—' : value;
    }

    function clear(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function appendBadge(parent, status) {
      const badge = document.createElement('span');
      badge.className = `badge status-${status || 'none'}`;
      badge.textContent = status || 'none';
      parent.appendChild(badge);
    }

    function appendTags(parent, tags, removable) {
      clear(parent);
      if (!tags || tags.length === 0) {
        const empty = document.createElement('span');
        empty.className = 'muted';
        empty.textContent = '—';
        parent.appendChild(empty);
        return;
      }
      tags.forEach(function(tag) {
        const chip = document.createElement('span');
        chip.className = 'chip';
        const text = document.createElement('span');
        text.textContent = tag;
        chip.appendChild(text);
        if (removable) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = '×';
          btn.onclick = function() {
            saveTags((currentCustomer.customer.tags || []).filter(function(t) { return t !== tag; }));
          };
          chip.appendChild(btn);
        }
        parent.appendChild(chip);
      });
    }

    function buildParams(page) {
      const params = new URLSearchParams({ page: page || currentPage, limit, sort: currentSort, dir: currentDir });
      const search = document.getElementById('searchInput').value.trim();
      const tag = document.getElementById('tagInput').value.trim();
      const lumina = document.getElementById('luminaFilter').value;
      const course = document.getElementById('courseFilter').value;
      const hasActivity = document.getElementById('activityFilter').value;
      if (search) params.set('search', search);
      if (tag) params.set('tag', tag);
      if (lumina) params.set('lumina', lumina);
      if (course) params.set('course', course);
      if (hasActivity) params.set('hasActivity', hasActivity);
      return params;
    }

    async function loadCustomers(page) {
      currentPage = page || 1;
      const data = await api(`/customers?${buildParams(currentPage)}`);
      const tb = document.getElementById('customersTable');
      clear(tb);
      if (!data.customers.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.className = 'empty';
        td.colSpan = 8;
        td.textContent = 'No customers found';
        tr.appendChild(td);
        tb.appendChild(tr);
      } else {
        data.customers.forEach(function(customer) {
          const tr = document.createElement('tr');
          const email = document.createElement('td');
          const link = document.createElement('a');
          link.className = 'customer-link';
          link.href = `#/c/${customer.id}`;
          link.textContent = customer.email;
          email.appendChild(link);
          tr.appendChild(email);

          ['name'].forEach(function(key) {
            const td = document.createElement('td');
            setText(td, customer[key]);
            tr.appendChild(td);
          });
          const created = document.createElement('td');
          created.textContent = formatDate(customer.createdAt);
          tr.appendChild(created);
          const login = document.createElement('td');
          login.textContent = formatDateTime(customer.lastLoginAt);
          tr.appendChild(login);
          const paid = document.createElement('td');
          paid.textContent = yen(customer.totalPaidJpy);
          tr.appendChild(paid);
          const courseCount = document.createElement('td');
          courseCount.textContent = customer.courseCount;
          tr.appendChild(courseCount);
          const lumina = document.createElement('td');
          appendBadge(lumina, customer.luminaStatus);
          tr.appendChild(lumina);
          const tags = document.createElement('td');
          tags.className = 'chip-list';
          appendTags(tags, customer.tags || [], false);
          tr.appendChild(tags);
          tb.appendChild(tr);
        });
      }
      renderPagination(document.getElementById('pagination'), data.page, data.total, limit, loadCustomers);
    }

    function metric(label, value) {
      const el = document.createElement('div');
      el.className = 'metric';
      const l = document.createElement('div');
      l.className = 'label';
      l.textContent = label;
      const v = document.createElement('div');
      v.className = 'value';
      v.textContent = value == null || value === '' ? '—' : value;
      el.append(l, v);
      return el;
    }

    function makeTable(headers, rows, emptyText) {
      const wrap = document.createElement('div');
      wrap.className = 'card-body';
      wrap.style.padding = '0';
      wrap.style.overflowX = 'auto';
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const trh = document.createElement('tr');
      headers.forEach(function(h) {
        const th = document.createElement('th');
        th.textContent = h;
        trh.appendChild(th);
      });
      thead.appendChild(trh);
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      if (!rows.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = headers.length;
        td.className = 'empty';
        td.textContent = emptyText;
        tr.appendChild(td);
        tbody.appendChild(tr);
      } else {
        rows.forEach(function(cells) {
          const tr = document.createElement('tr');
          cells.forEach(function(cell) {
            const td = document.createElement('td');
            if (cell instanceof Node) td.appendChild(cell);
            else td.textContent = cell == null || cell === '' ? '—' : cell;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      }
      table.appendChild(tbody);
      wrap.appendChild(table);
      return wrap;
    }

    function card(title, body) {
      const el = document.createElement('div');
      el.className = 'card';
      const header = document.createElement('div');
      header.className = 'card-header';
      const h = document.createElement('h3');
      h.textContent = title;
      header.appendChild(h);
      el.appendChild(header);
      el.appendChild(body);
      return el;
    }

    async function loadDetail(id) {
      currentCustomer = await api(`/customers/${id}`);
      const data = currentCustomer;
      document.getElementById('detailTitle').textContent = data.customer.email;
      const root = document.getElementById('detailRoot');
      clear(root);

      const headerBody = document.createElement('div');
      headerBody.className = 'card-body detail-grid';
      headerBody.append(
        metric('Email', data.customer.email),
        metric('Name', data.customer.name),
        metric('Signup', formatDate(data.customer.createdAt)),
        metric('Last Login', formatDateTime(data.customer.lastLoginAt)),
        metric('Total Paid', yen(data.purchases.reduce(function(sum, p) { return sum + (p.status === 'succeeded' ? Number(p.amount) || 0 : 0); }, 0))),
        metric('Courses', data.courses.length)
      );
      root.appendChild(card('Summary', headerBody));

      const purchaseRows = data.purchases.map(function(p) {
        const link = document.createElement('span');
        if (p.stripeDashboardUrl) {
          const a = document.createElement('a');
          a.href = p.stripeDashboardUrl;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.className = 'customer-link';
          a.textContent = p.stripePaymentIntentId || 'Stripe';
          link.appendChild(a);
        } else {
          link.textContent = p.stripePaymentIntentId || '—';
        }
        return [formatDateTime(p.createdAt), p.productName || '', yen(p.amount), p.currency, p.status, link];
      });
      root.appendChild(card('Purchases', makeTable(['Date', 'Product', 'Amount', 'Currency', 'Status', 'Stripe'], purchaseRows, 'No purchases recorded')));

      const courseRows = data.courses.map(function(c) {
        const progress = document.createElement('div');
        progress.style.display = 'flex';
        progress.style.alignItems = 'center';
        progress.style.gap = '10px';
        const bar = document.createElement('div');
        bar.className = 'progress-bar';
        const fill = document.createElement('div');
        fill.className = 'progress-bar-fill';
        fill.style.width = `${c.completionPct}%`;
        bar.appendChild(fill);
        const pct = document.createElement('span');
        pct.textContent = `${c.completedCount}/${c.totalLessons} (${c.completionPct}%)`;
        progress.append(bar, pct);
        const open = document.createElement('a');
        open.className = 'btn btn-sm';
        open.href = c.openAsStudentUrl;
        open.target = '_blank';
        open.rel = 'noopener noreferrer';
        open.textContent = 'Open watch page';
        return [c.courseName, progress, c.startedCount, formatDateTime(c.lastWatchedAt), open];
      });
      root.appendChild(card('Courses', makeTable(['Course', 'Progress', 'Started', 'Last Watched', 'Open'], courseRows, 'No courses owned')));

      const split = document.createElement('div');
      split.className = 'section-grid';
      const left = document.createElement('div');
      const right = document.createElement('div');

      const luminaBody = document.createElement('div');
      luminaBody.className = 'card-body detail-grid';
      if (data.lumina) {
        const statusMetric = metric('Status', '');
        statusMetric.querySelector('.value').textContent = '';
        appendBadge(statusMetric.querySelector('.value'), data.lumina.normalizedStatus);
        luminaBody.append(
          statusMetric,
          metric('Plan', data.lumina.planCode),
          metric('Granted', formatDateTime(data.lumina.lifetimeGrantedAt)),
          metric('Period End', formatDateTime(data.lumina.currentPeriodEnd))
        );
      } else {
        luminaBody.appendChild(metric('Status', 'none'));
      }
      left.appendChild(card('Lumina', luminaBody));

      const qaRows = data.qaThreads.map(function(t) {
        const link = document.createElement('a');
        link.className = 'customer-link';
        link.href = `/admin/qa.html#thread-${t.id}`;
        link.textContent = t.subject || '(no subject)';
        return [link, t.courseId || '', t.status, t.unreadForAdmin ? 'yes' : 'no', t.messageCount, formatDateTime(t.lastMessageAt)];
      });
      left.appendChild(card('Q&A Threads', makeTable(['Subject', 'Course', 'Status', 'Unread', 'Messages', 'Last Message'], qaRows, 'No Q&A threads')));

      const newsletterBody = document.createElement('div');
      newsletterBody.className = 'card-body';
      if (data.newsletter) {
        newsletterBody.append(
          metric('Subscribed', data.newsletter.subscribed ? 'yes' : 'no'),
          metric('Source', data.newsletter.source),
          metric('Status', data.newsletter.status)
        );
        const tagWrap = document.createElement('div');
        tagWrap.className = 'chip-list';
        tagWrap.style.marginTop = '12px';
        appendTags(tagWrap, data.newsletter.tags || [], false);
        newsletterBody.appendChild(tagWrap);
      } else {
        newsletterBody.appendChild(metric('Subscribed', 'no'));
      }
      right.appendChild(card('Newsletter', newsletterBody));

      const tagsBody = document.createElement('div');
      tagsBody.className = 'card-body';
      const chipWrap = document.createElement('div');
      chipWrap.id = 'detailTags';
      chipWrap.className = 'chip-list';
      appendTags(chipWrap, data.customer.tags || [], true);
      const editor = document.createElement('div');
      editor.className = 'tag-editor';
      const tagInput = document.createElement('input');
      tagInput.id = 'newTagInput';
      tagInput.placeholder = 'Add tag';
      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-primary';
      addBtn.type = 'button';
      addBtn.textContent = 'Add';
      addBtn.onclick = addTag;
      tagInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          addTag();
        }
      });
      editor.append(tagInput, addBtn);
      tagsBody.append(chipWrap, editor);
      right.appendChild(card('Tags', tagsBody));

      const notesBody = document.createElement('div');
      notesBody.className = 'card-body';
      const textarea = document.createElement('textarea');
      textarea.id = 'notesInput';
      textarea.value = data.customer.notes || '';
      lastSavedNotes = textarea.value;
      textarea.addEventListener('blur', saveNotes);
      textarea.addEventListener('input', function() {
        clearTimeout(noteTimer);
        noteTimer = setTimeout(saveNotes, 800);
      });
      const state = document.createElement('div');
      state.id = 'notesState';
      state.className = 'notes-state';
      state.textContent = 'Saved';
      notesBody.append(textarea, state);
      right.appendChild(card('Notes', notesBody));

      split.append(left, right);
      root.appendChild(split);
    }

    async function saveTags(tags) {
      const data = await api(`/customers/${currentCustomer.customer.id}/tags`, { method: 'PUT', body: { tags } });
      currentCustomer.customer.tags = data.tags || [];
      appendTags(document.getElementById('detailTags'), currentCustomer.customer.tags, true);
      document.getElementById('newTagInput').value = '';
    }

    async function addTag() {
      const input = document.getElementById('newTagInput');
      const value = input.value.trim();
      if (!value) return;
      const tags = (currentCustomer.customer.tags || []).concat([value]);
      try {
        await saveTags(tags);
      } catch (e) {
        alert(e.message);
      }
    }

    async function saveNotes() {
      if (!currentCustomer) return;
      const textarea = document.getElementById('notesInput');
      const state = document.getElementById('notesState');
      if (!textarea || textarea.value === lastSavedNotes) return;
      state.textContent = 'Saving...';
      try {
        const data = await api(`/customers/${currentCustomer.customer.id}/notes`, { method: 'PUT', body: { notes: textarea.value } });
        lastSavedNotes = data.notes || '';
        currentCustomer.customer.notes = lastSavedNotes;
        state.textContent = 'Saved';
      } catch (e) {
        state.textContent = e.message;
      }
    }

    function showList() {
      document.getElementById('detailView').style.display = 'none';
      document.getElementById('listView').style.display = '';
      loadCustomers(currentPage).catch(function(e) { alert(e.message); });
    }

    function route() {
      const hash = location.hash || '#/';
      const match = hash.match(/^#\/c\/(\d+)/);
      if (match) {
        document.getElementById('listView').style.display = 'none';
        document.getElementById('detailView').style.display = '';
        loadDetail(match[1]).catch(function(e) { alert(e.message); });
      } else {
        showList();
      }
    }

    function exportCSV() {
      const params = buildParams(currentPage);
      params.delete('page');
      params.delete('limit');
      if (document.getElementById('includeNotesExport').checked) params.set('includeNotes', 'true');
      const url = `/api/admin/customers/export?${params}`;
      fetch(url, { credentials: 'same-origin' })
        .then(function(r) { if (!r.ok) throw new Error('Export failed'); return r.blob(); })
        .then(function(blob) {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'customers.csv';
          a.click();
          URL.revokeObjectURL(a.href);
        })
        .catch(function(e) { alert(e.message); });
    }

    let searchTimer;
    ['searchInput', 'tagInput'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() { loadCustomers(1).catch(function(e) { alert(e.message); }); }, 300);
      });
    });
    ['luminaFilter', 'courseFilter', 'activityFilter'].forEach(function(id) {
      document.getElementById(id).addEventListener('change', function() { loadCustomers(1).catch(function(e) { alert(e.message); }); });
    });
    document.querySelectorAll('.sortable').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const sort = btn.dataset.sort;
        if (currentSort === sort) currentDir = currentDir === 'asc' ? 'desc' : 'asc';
        else { currentSort = sort; currentDir = 'desc'; }
        document.querySelectorAll('.sortable').forEach(function(item) { item.classList.toggle('active', item.dataset.sort === currentSort); });
        loadCustomers(1).catch(function(e) { alert(e.message); });
      });
    });
    document.getElementById('exportBtn').addEventListener('click', exportCSV);
    window.addEventListener('hashchange', route);
    route();
