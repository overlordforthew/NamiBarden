<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customers — Nami Barden Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .sortable{background:none;border:0;color:inherit;font:inherit;text-transform:inherit;letter-spacing:inherit;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:4px;}
    .sortable.active{color:var(--gold-dark);}
    .customer-link{color:var(--gold-dark);text-decoration:none;font-weight:600;}
    .customer-link:hover{text-decoration:underline;}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;}
    .metric{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:14px;}
    .metric .label{font-size:0.75rem;color:var(--text-light);text-transform:uppercase;letter-spacing:0.04em;}
    .metric .value{font-size:1rem;font-weight:600;margin-top:4px;word-break:break-word;}
    .section-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
    .progress-bar{height:8px;background:#e8e4de;border-radius:4px;overflow:hidden;min-width:120px;}
    .progress-bar-fill{height:100%;background:var(--gold);border-radius:4px;}
    .chip-list{display:flex;gap:6px;flex-wrap:wrap;}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;background:var(--cream);border:1px solid var(--border);border-radius:4px;font-size:0.76rem;}
    .chip button{border:0;background:transparent;color:var(--danger);cursor:pointer;font:inherit;padding:0 2px;}
    .tag-editor{display:flex;gap:8px;margin-top:12px;}
    .tag-editor input{min-width:0;}
    .status-lifetime,.status-active,.status-trialing,.status-grace{background:#e6f7ed;color:#1a7;}
    .status-expired,.status-refunded,.status-revoked{background:#fee;color:#c44;}
    .status-none{background:#eef0f2;color:#667;}
    .notes-state{font-size:0.8rem;color:var(--text-light);margin-top:8px;}
    .muted{color:var(--text-light);}
    @media (max-width:980px){.section-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand"><h2>Nami Barden</h2><small>Newsletter Admin</small></div>
    <a href="/admin/dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg><span>Dashboard</span></a>
    <a href="/admin/customers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 11c1.657 0 3-1.567 3-3.5S17.657 4 16 4s-3 1.567-3 3.5S14.343 11 16 11zM8 11c1.657 0 3-1.567 3-3.5S9.657 4 8 4 5 5.567 5 7.5 6.343 11 8 11zM2 20c.5-3 2.5-5 6-5s5.5 2 6 5M10 20c.4-2.4 2-4 6-4 3.2 0 5 1.5 6 4"/></svg><span>Customers</span></a>
    <a href="/admin/matrix.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5h16M4 12h16M4 19h16M9 5v14M15 5v14"/></svg><span>Matrix</span></a>
    <a href="/admin/subscribers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 20H7a5 5 0 0110 0zM12 10a3 3 0 100-6 3 3 0 000 6z"/></svg><span>Subscribers</span></a>
    <a href="/admin/students.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 14l9-5-9-5-9 5 9 5zM6 12v5c2 2 10 2 12 0v-5"/></svg><span>Students</span></a>
    <a href="/admin/qa.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12c0 4-4 7-9 7-1.4 0-2.8-.3-4-.8L3 20l1.5-4C3.6 14.8 3 13.4 3 12c0-4 4-7 9-7s9 3 9 7z"/></svg><span>Q&A</span></a>
    <a href="/admin/reminders.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>Email Rules</span></a>
    <a href="/admin/compose.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg><span>Compose</span></a>
    <a href="/admin/campaigns.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16v12H4zM4 7l8 6 8-6"/></svg><span>Campaigns</span></a>
    <a href="/admin/alerts.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.3 4l-8 14h19.4l-8-14a2 2 0 00-3.4 0z"/></svg><span>Alerts</span></a>
    <a href="/admin/lumina.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3l2.5 5.5L20 11l-5.5 2.5L12 19l-2.5-5.5L4 11l5.5-2.5L12 3z"/></svg><span>Lumina</span></a>
    <div class="sidebar-logout"><a href="#" id="logoutLink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4-4-4M21 12H7M13 20H5a2 2 0 01-2-2V6a2 2 0 012-2h8"/></svg><span>Logout</span></a></div>
  </nav>

  <main class="main-content">
    <div id="listView">
      <div class="page-header">
        <h1>Customers</h1>
        <div class="btn-group">
          <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-light);margin:0;">
            <input type="checkbox" id="includeNotesExport" style="width:auto"> Include notes
          </label>
          <button class="btn" id="exportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>Export CSV</button>
        </div>
      </div>

      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search email or name..." style="min-width:250px">
        <input type="text" id="tagInput" placeholder="Tag">
        <select id="luminaFilter">
          <option value="">All Lumina</option>
          <option value="lifetime">lifetime</option>
          <option value="active">active</option>
          <option value="trialing">trialing</option>
          <option value="grace">grace</option>
          <option value="expired">expired</option>
          <option value="refunded">refunded</option>
          <option value="revoked">revoked</option>
          <option value="none">none</option>
        </select>
        <select id="courseFilter">
          <option value="">All courses</option>
          <option value="course-1">Course 1</option>
          <option value="course-2">Course 2</option>
        </select>
        <select id="activityFilter">
          <option value="">Any activity</option>
          <option value="30d">Last 30 days</option>
          <option value="90d">Last 90 days</option>
          <option value="never">Never</option>
        </select>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0;overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Name</th>
                <th><button class="sortable active" data-sort="created_at">Signup</button></th>
                <th><button class="sortable" data-sort="last_login_at">Last Login</button></th>
                <th><button class="sortable" data-sort="total_paid_jpy">Paid</button></th>
                <th><button class="sortable" data-sort="course_count">Courses</button></th>
                <th>Lumina</th>
                <th>Tags</th>
              </tr>
            </thead>
            <tbody id="customersTable"></tbody>
          </table>
        </div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <div id="detailView" style="display:none;">
      <div class="page-header">
        <h1 id="detailTitle">Customer</h1>
        <a class="btn" href="#/">Back to customers</a>
      </div>
      <div id="detailRoot"></div>
    </div>
  </main>

  <script src="/admin/admin.js?v=2"></script>
  <script src="/admin/js/customers.js?v=2"></script>
</body>
</html>
