server {
    listen 80;
    server_name namibarden.com www.namibarden.com;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Gzip compression (fallback for clients without brotli support)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/manifest+json
        image/svg+xml;

    # Security headers (server-level)
    include /etc/nginx/security-headers.conf;

    # Move Blue Moon traffic off the main app entirely.
    location ^~ /api/bluemoon/ {
        return 308 https://bluemoon.namibarden.com$request_uri;
    }

    location = /bluemoon {
        return 301 https://bluemoon.namibarden.com/;
    }

    location = /bluemoon.html {
        return 301 https://bluemoon.namibarden.com/;
    }

    # API proxy to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5m;
    }

    # Admin dashboard
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        include /etc/nginx/security-headers.conf;
    }

    # YouTube RSS feed proxy (avoids CORS)
    location = /api/youtube-feed {
        resolver 8.8.8.8 valid=300s;
        proxy_pass https://www.youtube.com/feeds/videos.xml?channel_id=UCKkvy8wapsStrRPyaOrXeCQ;
        proxy_ssl_server_name on;
        proxy_set_header Host www.youtube.com;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        include /etc/nginx/security-headers.conf;
    }

    location = /index {
        return 301 https://$host/;
    }

    location = /index.html {
        return 301 https://$host/;
    }

    location ~ ^/(en|consultation|consultation-en|couples-coaching|couples-coaching-en|executive-coaching|executive-coaching-en|certification-course|certification-course-en|online-course-1|online-course-2|privacy-policy|privacy-policy-en|payment-success|payment-success-en|payment-cancel|payment-cancel-en|login|signup|forgot-password|reset-password|my-courses|watch|scripts|lumina|bigtalk)/$ {
        return 308 https://$host/$1$is_args$args;
    }

    location ~ ^/(?!admin/)(.+)\.html$ {
        return 301 https://$host/$1$is_args$args;
    }

    # Keep the lead magnet behind the signed download route.
    location = /gifts/5day-journal.pdf {
        return 302 https://$host/#resources;
    }

    # HTML pages — force fresh fetch every time (fixes Chrome mobile aggressive caching)
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        include /etc/nginx/security-headers.conf;
    }

    # Cache static assets (1 day with revalidation — no immutable so updates propagate)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|json|webp|avif)$ {
        add_header Cache-Control "public, max-age=86400" always;
        include /etc/nginx/security-headers.conf;
    }

    # Cache robots.txt
    location = /robots.txt {
        expires 7d;
        log_not_found off;
    }

    # Cache sitemap
    location = /sitemap.xml {
        expires 1d;
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
